name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync (light runtime + dev tools)
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      # Deterministic eval gate: fixed slice, greedy (temperature=0). Runs the mock
      # backend in CI so the decision is reproducible without a GPU; on the box it runs
      # against SGLang. Headline multi-seed + bootstrap CIs are Phase 5/8, NOT this gate.
      - name: Eval gate (deterministic)
        run: uv run python -m eval.gate

      - name: Build app image
        run: docker build -t policyarena:ci .
