# Fine-tuning (PEFT). DEFAULT TARGET = RTX 5090 (32GB, sm_120) -> QLoRA 4-bit.
# On an RTX PRO 6000 (96GB), switch to bf16 LoRA: method=lora, load_in_4bit=false,
# and raise per_device_train_batch_size to ~8.
method: "qlora"                      # qlora (5090, default) | lora (PRO 6000)
base_model: "Qwen/Qwen3-8B"

quantization:
  load_in_4bit: true                 # QLoRA 4-bit base (5090); false => bf16 (PRO 6000)
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: "all-linear"

train:
  per_device_train_batch_size: 2     # fits 32GB; raise to ~8 on a PRO 6000
  gradient_accumulation_steps: 8     # effective batch = 16
  learning_rate: 2.0e-4
  num_train_epochs: 2
  warmup_ratio: 0.03
  max_seq_len: 4096
  bf16: true
  seed: 42

output:
  adapter_dir: "outputs/adapters/qwen3-8b-policyarena"
  save_adapter_only: true
