# Fine-tuning (PEFT). DEFAULT TARGET = RTX PRO 6000 (96GB, sm_120) -> LoRA + bf16.
# On a single RTX 5090 (32GB), switch to QLoRA: method=qlora, load_in_4bit=true,
# and drop per_device_train_batch_size to ~2.
method: "lora"                       # lora (PRO 6000) | qlora (5090)
base_model: "Qwen/Qwen3-8B"

quantization:
  load_in_4bit: false                # true => QLoRA 4-bit base (5090)
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: "all-linear"

train:
  per_device_train_batch_size: 8     # 96GB headroom; drop to ~2 on a 5090
  gradient_accumulation_steps: 2     # effective batch = 16
  learning_rate: 2.0e-4
  num_train_epochs: 2
  warmup_ratio: 0.03
  max_seq_len: 4096
  bf16: true
  seed: 42

output:
  adapter_dir: "outputs/adapters/qwen3-8b-policyarena"
  save_adapter_only: true
