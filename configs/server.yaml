# Serving (OpenAI-compatible). PRIMARY engine = SGLang (lmsysorg/sglang:blackwell).
# DEFAULT TARGET = RTX PRO 6000 (96GB): serve bf16 (no --quantization). On a 5090,
# set sglang.quantization to "fp8" (or awq). fp8 is also a throughput ablation here.
backend: "sglang"                    # sglang | vllm | ollama

sglang:
  model_path: "Qwen/Qwen3-8B"
  host: "0.0.0.0"
  port: 30000
  # quantization: "fp8"              # uncomment for fp8 serving (5090, or throughput)
  tool_call_parser: "qwen25"
  reasoning_parser: "qwen3"
  attention_backend: "flashinfer"
  grammar_backend: "xgrammar"        # enables tool_choice: "required"
  mem_fraction_static: 0.85

vllm:                                # documented alternative
  model: "Qwen/Qwen3-8B"
  port: 8000
  enable_auto_tool_choice: true
  tool_call_parser: "hermes"

ollama:                              # local dev fallback (not for production results)
  base_url: "http://localhost:11434/v1"
  model: "qwen3:8b"

sampling:
  temperature: 0.0                   # greedy default -> deterministic CI gate
  top_p: 1.0
  max_tokens: 1024

agent:
  # 1 = single tool per turn (CI gate / zh service-desk / BFCL). Raise for multi-step
  # agentic loops (tau2-bench): the model calls a tool, observes, then decides again.
  max_steps: 1
