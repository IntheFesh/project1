# LiteLLM gateway (STRETCH): multi-model routing / fallback in front of SGLang & vLLM.
model_list:
  - model_name: qwen3-8b
    litellm_params:
      model: openai/Qwen/Qwen3-8B
      api_base: os.environ/OPENAI_BASE_URL
      api_key: os.environ/OPENAI_API_KEY
  - model_name: qwen3-8b-vllm
    litellm_params:
      model: openai/Qwen/Qwen3-8B
      api_base: os.environ/VLLM_BASE_URL
      api_key: os.environ/OPENAI_API_KEY

router_settings:
  fallbacks:
    - qwen3-8b: ["qwen3-8b-vllm"]
